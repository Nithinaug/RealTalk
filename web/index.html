<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>RealTalk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div id="auth-container" class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="app-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="#22c55e" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z" />
          </svg>
        </div>
        <h1>RealTalk</h1>
      </div>

      <div id="login-form">
        <div class="input-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" name="username" autocomplete="username"
            placeholder="Enter your username">
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <div class="password-field">
            <input type="password" id="login-password" name="password" autocomplete="current-password"
              placeholder="Enter your password">
          </div>
        </div>
        <button id="login-button" class="btn-primary">
          <span class="btn-text">Login</span>
          <div class="loader" style="display: none;"></div>
        </button>
        <p class="auth-switch">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
      </div>

      <div id="signup-form" style="display: none;">
        <div class="input-group">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" name="username" autocomplete="new-username"
            placeholder="Pick a username">
        </div>
        <div class="input-group">
          <label for="signup-password">Password</label>
          <div class="password-field">
            <input type="password" id="signup-password" name="password" autocomplete="new-password"
              placeholder="Create a password">
          </div>
        </div>
        <button id="signup-button" class="btn-primary">
          <span class="btn-text">Sign Up</span>
          <div class="loader" style="display: none;"></div>
        </button>
        <p class="auth-switch">Already have an account? <a href="#" id="show-login">Login</a></p>
      </div>
    </div>
  </div>

  <div id="room-selection-container" class="auth-wrapper" style="display: none;">
    <div class="auth-card">
      <div class="auth-header">
        <div class="app-icon" style="margin-bottom: 12px;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="#22c55e" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M17 10H7C5.89543 10 5 10.8954 5 12V20C5 21.1046 5.89543 22 7 22H17C18.1046 22 19 21.1046 19 20V12C19 10.8954 18.1046 10 17 10Z"
              fill-opacity="0.3" />
            <path
              d="M16 22V9C16 6.79086 14.2091 5 12 5C9.79086 5 8 6.79086 8 9V22M17 10H7C5.89543 10 5 10.8954 5 12V20C5 21.1046 5.89543 22 7 22H17C18.1046 22 19 21.1046 19 20V12C19 10.8954 18.1046 10 17 10Z"
              stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <h1>Rooms</h1>
        <button id="auth-back-to-login" class="btn-text-only" style="margin-top: 8px;">Back to Login</button>
      </div>

      <div id="rooms-list-view">
        <div id="joined-rooms-list" class="rooms-grid">
          <!-- Joined rooms populated here -->
        </div>

        <div class="room-action-buttons">
          <button id="show-create-room" class="btn-primary room-btn">Create Room</button>
          <button id="show-join-room" class="btn-secondary room-btn">Join Room</button>
        </div>
      </div>

      <div id="create-room-view" style="display: none;">
        <div class="input-group">
          <label for="create-room-name">Room Name</label>
          <input type="text" id="create-room-name" placeholder="Room Name">
        </div>
        <div class="input-group">
          <label for="create-room-id">Room ID</label>
          <div class="password-field">
            <input type="password" id="create-room-id" placeholder="Room ID">
          </div>
        </div>
        <button id="create-room-submit" class="btn-primary">Create</button>
        <button class="btn-text-only back-to-rooms">Cancel</button>
      </div>

      <div id="join-room-view" style="display: none;">
        <div class="input-group">
          <label for="join-room-name">Room Name</label>
          <input type="text" id="join-room-name" placeholder="Room Name">
        </div>
        <div class="input-group">
          <label for="join-room-id">Room ID</label>
          <div class="password-field">
            <input type="password" id="join-room-id" placeholder="Room ID">
          </div>
        </div>
        <button id="join-room-submit" class="btn-primary">Join</button>
        <button class="btn-text-only back-to-rooms">Cancel</button>
      </div>
    </div>
  </div>

  <div id="main-chat" class="chat-wrapper" style="display: none;">
    <header class="chat-header">
      <div class="chat-info" style="display: flex; gap: 16px; align-items: center;">
        <button id="back-to-rooms-nav" class="btn-icon" title="Back to Rooms">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <div>
          <h2 id="current-room-name">Chat Room</h2>
          <div class="status-badge">
            <span class="status-dot"></span>
            <span id="online-count">0 online</span>
          </div>
        </div>
      </div>
      <div class="header-actions">
        <span id="display-name" class="username-pill"></span>
        <button id="clear-chat-button" class="btn-icon" title="Clear History">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
        <button id="logout-button" class="btn-logout">Logout</button>
      </div>
    </header>

    <main class="chat-layout">
      <aside class="rooms-sidebar">
        <div class="panel-header">
          <h3>My Rooms</h3>
        </div>
        <div id="userRoomsList" class="rooms-list"></div>
        <div class="panel-footer" style="padding: 20px; border-top: 1px solid var(--border);">
          <button id="sidebar-add-room-btn" class="btn-primary"
            style="margin-top: 0; background: white; color: var(--primary); border: 2px solid var(--primary);">
            + Join / Create
          </button>
        </div>
      </aside>

      <section class="messages-container">
        <div id="chatMessages" class="messages-list"></div>
        <div class="input-area">
          <div class="input-wrapper">
            <input id="chatInput" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn" class="btn-send">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" />
              </svg>
            </button>
          </div>
        </div>
      </section>

      <aside class="online-users-panel">
        <div class="panel-header">
          <h3>Online</h3>
        </div>
        <div id="onlineUsers" class="users-list"></div>
      </aside>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/static/config.js"></script>
  <script src="/static/app.js?v=3"></script>
</body>

</html>
